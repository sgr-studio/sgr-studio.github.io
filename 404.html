<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/top.css">
  <link rel="shortcut icon" href="media/icon/favicon.png" type="image/x-icon">
  <title>404 Not Found / SGR STUDIO</title>
  <style>
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 70vh;
      text-align: center;
    }
    .error-code {
      font-size: 8rem;
      font-weight: bold;
      color: #8ec830; /* サイトのテーマカラーに合わせてるよ */
      margin: 0;
    }
    .error-message {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }
    .back-home {
      padding: 10px 20px;
      background: #8ec830;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: opacity 0.3s;
    }
    .back-home:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body data-page="404">
  <header>
    <div>
      <a href="index.html" class="logo">
        <div id="logo">
          <div class="logo-svg"></div>
          <span>SGR STUDIO</span>
        </div>
      </a>
    </div>
  </header>

  <div class="screen">
    <main class="error-container">
      <h1 class="error-code">404</h1>
      <p class="error-message">お探しのページは見つかりませんでした。</p>
      <a href="index.html" class="back-home">HOMEへ戻る</a>
    </main>

    <footer>
      <p><small>&COPY; SGR STUDIO</small></p>
    </footer>
  </div>
</body>
</html>
